<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' data: https://cdn.5e.tools; script-src 'self'; style-src 'self'; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'">
  <meta name="description" content="Quick reference for the Turn of Fortune's Wheel D&D campaign">
  <title>Turn of Fortune's Wheel</title>
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
  <!-- Styles are split into cascade-ordered partials (see styles/). -->
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/tabs.css">
  <link rel="stylesheet" href="styles/filters.css">
  <link rel="stylesheet" href="styles/cards.css">
  <link rel="stylesheet" href="styles/search.css">
  <link rel="stylesheet" href="styles/modal.css">
  <link rel="stylesheet" href="styles/card-categories.css">
  <link rel="stylesheet" href="styles/character-sheet.css">
  <link rel="stylesheet" href="styles/misc.css">
  <link rel="stylesheet" href="styles/d20.css">
</head>

<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-title">Turn of Fortune's Wheel</div>
      <div class="header-sub">Quick Reference</div>
    </div>
  </header>

  <nav class="player-bar" role="tablist" aria-label="Player selection">
    <div class="player-bar-inner">
      <button class="player-btn" data-player="p1" role="tab" aria-selected="true" aria-controls="p1">
        <img class="player-btn-avatar is-loading" data-player-avatar="p1" src="" alt="">
        <span class="player-btn-num">P1</span>
        <span class="player-btn-name">Vespera / Lucia</span>
      </button>
      <button class="player-btn" data-player="p2" role="tab" aria-selected="false" aria-controls="p2">
        <img class="player-btn-avatar is-loading" data-player-avatar="p2" src="" alt="">
        <span class="player-btn-num">P2</span>
        <span class="player-btn-name">Karmine / Rubic</span>
      </button>
      <button class="player-btn" data-player="p3" role="tab" aria-selected="false" aria-controls="p3">
        <img class="player-btn-avatar is-loading" data-player-avatar="p3" src="" alt="">
        <span class="player-btn-num">P3</span>
        <span class="player-btn-name">Lucien / Seabastion / Christian</span>
      </button>
    </div>
  </nav>

  <main>
    <!-- Player 1 -->
    <div class="player-page" id="p1" role="tabpanel">
      <div class="inc-bar" role="tablist" aria-label="Incarnation selection">
        <button class="inc-btn" data-inc="vespera" role="tab" aria-selected="true"><img src="" alt="Vespera"
            class="inc-avatar" data-char="vespera"><span>Vespera</span></button>
        <button class="inc-btn" data-inc="lucia" role="tab" aria-selected="false"><img src="" alt="Lucia"
            class="inc-avatar" data-char="lucia"><span>Lucia</span></button>
        <button class="inc-btn" data-inc="speaksWithSpirits" role="tab" aria-selected="false"><img src="" alt="Speaks-With-Spirits"
            class="inc-avatar" data-char="speaksWithSpirits"><span>Speaks-With-Spirits</span></button>
      </div>
      <div class="inc-content" id="vespera" role="tabpanel"></div>
      <div class="inc-content" id="lucia" role="tabpanel"></div>
      <div class="inc-content" id="speaksWithSpirits" role="tabpanel"></div>
    </div>

    <!-- Player 2 -->
    <div class="player-page" id="p2" role="tabpanel">
      <div class="inc-bar" role="tablist" aria-label="Incarnation selection">
        <button class="inc-btn" data-inc="karmine" role="tab" aria-selected="true"><img src="" alt="Karmine"
            class="inc-avatar" data-char="karmine"><span>Karmine</span></button>
        <button class="inc-btn" data-inc="rubic" role="tab" aria-selected="false"><img src="" alt="Rubic"
            class="inc-avatar" data-char="rubic"><span>Rubic</span></button>
        <button class="inc-btn" data-inc="akai" role="tab" aria-selected="false"><img src="" alt="Akai"
            class="inc-avatar" data-char="akai"><span>Akai</span></button>
      </div>
      <div class="inc-content active" id="karmine" role="tabpanel"></div>
      <div class="inc-content" id="rubic" role="tabpanel"></div>
      <div class="inc-content" id="akai" role="tabpanel"></div>
    </div>

    <!-- Player 3 -->
    <div class="player-page" id="p3" role="tabpanel">
      <div class="inc-bar" role="tablist" aria-label="Incarnation selection">
        <button class="inc-btn" data-inc="lucien" role="tab" aria-selected="true"><img src="" alt="Lucien"
            class="inc-avatar" data-char="lucien"><span>Lucien</span></button>
        <button class="inc-btn" data-inc="seabastion" role="tab" aria-selected="false"><img src="" alt="Seabastion"
            class="inc-avatar" data-char="seabastion"><span>Seabastion</span></button>
        <button class="inc-btn" data-inc="christian" role="tab" aria-selected="false"><img src="" alt="Christian"
            class="inc-avatar" data-char="christian"><span>Christian</span></button>
      </div>
      <div class="inc-content" id="lucien" role="tabpanel"></div>
      <div class="inc-content" id="seabastion" role="tabpanel"></div>
      <div class="inc-content" id="christian" role="tabpanel"></div>
    </div>
  </main>

  <footer class="footer">
    <span>&copy; 2026 The Roost</span>
  </footer>

  <script type="module" src="js/main.js"></script>

</body>

</html>
